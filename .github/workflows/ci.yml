name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11.15"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          checksum: "a047d55651bc3e0ca24595b25ec4cfcb10f9dca9fb56514e661269b37d4fae68"
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          venv-path: ${{ runner.temp }}/netops-suite-ci-venv
          no-project: true
          enable-cache: true
          cache-dependency-glob: requirements-dev-lock.txt

      - name: Install dependencies
        run: uv pip install --require-hashes -r requirements-dev-lock.txt

      - name: Verify installed dependencies
        run: |
          python -c "import sys; assert sys.version_info[:3] == (3, 11, 15), sys.version"
          uv pip check

      - name: Audit installed dependencies
        run: python scripts/audit_dependencies.py

      - name: Lint Python sources
        run: python -m ruff check .

      - name: Compile Python sources
        run: python -m compileall -q main.py app netops_suite qa scripts tests

      - name: Run tests
        run: python -m pytest -q
