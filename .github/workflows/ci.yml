name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11.15"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -r requirements-dev-lock.txt

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Audit installed dependencies
        run: python scripts/audit_dependencies.py

      - name: Lint Python sources
        run: python -m ruff check .

      - name: Compile Python sources
        run: python -m compileall -q main.py app netops_suite qa scripts tests

      - name: Run tests
        run: python -m pytest -q
