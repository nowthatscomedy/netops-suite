name: Build And Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (example: v1.0.5)"
        required: true
        default: "v1.0.5"
      release_name:
        description: "Optional release title"
        required: false
        default: ""
      prerelease:
        description: "Publish as prerelease"
        required: false
        default: false
        type: boolean
      allow_asset_replace:
        description: "Allow replacing assets on an existing release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Release Metadata
        id: meta
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tagName = "${{ inputs.tag_name }}".Trim()
            $releaseName = "${{ inputs.release_name }}".Trim()
            $version = $tagName.TrimStart("v")
            $isPrerelease = "${{ inputs.prerelease }}" -eq "true"
          }
          else {
            $versionFile = Get-Content -Path "app/version.py" -Raw
            if ($versionFile -notmatch '__version__\s*=\s*"([^"]+)"') {
              throw "Could not find __version__ in app/version.py"
            }
            $version = $Matches[1].Trim()
            $tagName = "v$version"
            $releaseName = ""
            $isPrerelease = $version -match "-"
          }

          if ([string]::IsNullOrWhiteSpace($tagName)) {
            throw "A tag name is required."
          }

          if (-not $tagName.StartsWith("v")) {
            throw "The tag name must start with 'v'. Example: v1.0.0"
          }

          $version = $tagName.TrimStart("v")
          if ([string]::IsNullOrWhiteSpace($releaseName)) {
            $releaseName = "NetOps Suite $tagName"
          }

          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "is_prerelease=$($isPrerelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Check Existing Release
        id: release_guard
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{
            Authorization          = "Bearer $env:GITHUB_TOKEN"
            Accept                 = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.meta.outputs.tag_name }}"
          $isManual = "${{ github.event_name }}" -eq "workflow_dispatch"
          $allowAssetReplace = "${{ inputs.allow_asset_replace }}" -eq "true"

          try {
            $release = Invoke-RestMethod -Method GET -Uri $uri -Headers $headers
            if ($isManual -and $allowAssetReplace) {
              "should_release=true" >> $env:GITHUB_OUTPUT
              "reason=manual_replace_existing_release" >> $env:GITHUB_OUTPUT
            }
            elseif ($isManual) {
              throw "Release ${{ steps.meta.outputs.tag_name }} already exists. Re-run with allow_asset_replace=true only when you intentionally want to replace release assets."
            }
            else {
              "should_release=false" >> $env:GITHUB_OUTPUT
              "reason=release_exists" >> $env:GITHUB_OUTPUT
            }
          }
          catch {
            $statusCode = $null
            if ($_.Exception.Response) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }

            if ($statusCode -eq 404) {
              "should_release=true" >> $env:GITHUB_OUTPUT
              "reason=release_missing" >> $env:GITHUB_OUTPUT
            }
            else {
              throw
            }
          }

      - name: Skip Release Build
        if: steps.release_guard.outputs.should_release != 'true'
        shell: powershell
        run: |
          Write-Host "Release already exists for ${{ steps.meta.outputs.tag_name }}. Skipping build and publish."

      - name: Setup Python
        if: steps.release_guard.outputs.should_release == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Build Dependencies
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          choco install innosetup --no-progress -y

      - name: Verify Runtime Dependencies
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: |
          python -c "import pyftpdlib, OpenSSL, paramiko, tftpy, netmiko, msoffcrypto, xlrd; from telnetlib3 import telnetlib; print('NetOps Suite runtime dependencies OK')"

      - name: Verify Tag Matches App Version
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: |
          $tagVersion = "${{ steps.meta.outputs.version }}"
          $versionFile = Get-Content -Path "app/version.py" -Raw
          if ($versionFile -notmatch '__version__\s*=\s*"([^"]+)"') {
            throw "Could not find __version__ in app/version.py"
          }
          $appVersion = $Matches[1]

          if ($appVersion.Trim() -ne $tagVersion) {
            throw "Tag version ($tagVersion) does not match app/version.py version ($appVersion)."
          }

      - name: Build Installer
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          .\scripts\build_release.ps1 `
            -Version "${{ steps.meta.outputs.tag_name }}" `
            -Clean

      - name: Upload Workflow Artifact
        if: steps.release_guard.outputs.should_release == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: NetOpsSuite-installer-${{ steps.meta.outputs.tag_name }}
          path: |
            dist/release/NetOpsSuite-setup-*.exe
            dist/release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release Asset
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          $asset = Get-ChildItem -Path dist/release/NetOpsSuite-setup-*.exe | Select-Object -First 1 -ExpandProperty FullName
          $checksum = Get-ChildItem -Path dist/release/SHA256SUMS.txt | Select-Object -First 1 -ExpandProperty FullName
          $isPrerelease = [System.Convert]::ToBoolean("${{ steps.meta.outputs.is_prerelease }}")
          $publishArgs = @{
            Repository = "${{ github.repository }}"
            TagName = "${{ steps.meta.outputs.tag_name }}"
            ReleaseName = "${{ steps.meta.outputs.release_name }}"
            AssetPath = $asset
            ChecksumPath = $checksum
          }
          if ($isPrerelease) {
            $publishArgs["IsPrerelease"] = $true
          }
          if ([System.Convert]::ToBoolean("${{ inputs.allow_asset_replace }}")) {
            $publishArgs["AllowAssetReplace"] = $true
          }
          .\scripts\publish_release.ps1 @publishArgs
