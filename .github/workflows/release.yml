name: Build And Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (example: v1.0.9)"
        required: true
        default: "v1.0.9"
      release_name:
        description: "Optional release title"
        required: false
        default: ""
      prerelease:
        description: "Publish as prerelease"
        required: false
        default: false
        type: boolean
      allow_asset_replace:
        description: "Allow replacing assets on an existing unpublished draft"
        required: false
        default: false
        type: boolean
      allow_unsigned_release:
        description: "Explicitly allow an unsigned release when no code-signing certificate is configured"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Require Main Branch Source
        shell: powershell
        env:
          SOURCE_REF: ${{ github.ref }}
        run: |
          if ($env:SOURCE_REF -ne "refs/heads/main") {
            throw "Releases must be dispatched from refs/heads/main, not $($env:SOURCE_REF)."
          }

      - name: Resolve Release Metadata
        id: meta
        shell: powershell
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $tagName = $env:INPUT_TAG_NAME.Trim()
            $releaseName = $env:INPUT_RELEASE_NAME.Trim()
            $version = $tagName.TrimStart("v")
            $isPrerelease = $env:INPUT_PRERELEASE -eq "true"
          }
          else {
            $versionFile = Get-Content -Path "app/version.py" -Raw
            if ($versionFile -notmatch '__version__\s*=\s*"([^"]+)"') {
              throw "Could not find __version__ in app/version.py"
            }
            $version = $Matches[1].Trim()
            $tagName = "v$version"
            $releaseName = ""
            $isPrerelease = $version -match "-"
          }

          if ([string]::IsNullOrWhiteSpace($tagName)) {
            throw "A tag name is required."
          }

          if ($tagName -notmatch '^v\d+\.\d+\.\d+(?:-[0-9A-Za-z]+(?:[.-][0-9A-Za-z]+)*)?$') {
            throw "The tag name must be a semantic version beginning with 'v'. Example: v1.0.0"
          }

          $version = $tagName.TrimStart("v")
          if ([string]::IsNullOrWhiteSpace($releaseName)) {
            $releaseName = "NetOps Suite $tagName"
          }
          if ($releaseName -match "[`r`n]") {
            throw "The release name must be a single line."
          }
          if ($releaseName.Length -gt 200) {
            throw "The release name must not exceed 200 characters."
          }

          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "is_prerelease=$($isPrerelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Check Existing Release
        id: release_guard
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
          ALLOW_ASSET_REPLACE: ${{ inputs.allow_asset_replace }}
        run: |
          $headers = @{
            Authorization          = "Bearer $env:GITHUB_TOKEN"
            Accept                 = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $encodedTag = [Uri]::EscapeDataString($env:TAG_NAME)
          $uri = "https://api.github.com/repos/$($env:REPOSITORY)/releases/tags/$encodedTag"
          $isManual = $env:EVENT_NAME -eq "workflow_dispatch"
          $allowAssetReplace = $env:ALLOW_ASSET_REPLACE -eq "true"

          $release = $null
          try {
            $release = Invoke-RestMethod -Method GET -Uri $uri -Headers $headers
          }
          catch {
            $statusCode = $null
            if ($_.Exception.Response) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }

            if ($statusCode -ne 404) {
              throw
            }
          }

          # GitHub's release-by-tag endpoint does not return unpublished drafts.
          # Search the authenticated release list before treating the tag as new.
          if (-not $release) {
            $allReleasesUri = "https://api.github.com/repos/$($env:REPOSITORY)/releases?per_page=100"
            $allReleases = Invoke-RestMethod -Method GET -Uri $allReleasesUri -Headers $headers
            $release = @($allReleases | Where-Object {
              $_.tag_name -eq $env:TAG_NAME
            }) | Select-Object -First 1
          }

          if (-not $release) {
            "should_release=true" >> $env:GITHUB_OUTPUT
            "reason=release_missing" >> $env:GITHUB_OUTPUT
          }
          elseif (-not $release.draft) {
            throw "Release $($env:TAG_NAME) is already published and is immutable. Create a new version instead."
          }
          elseif ($isManual -and $allowAssetReplace) {
            "should_release=true" >> $env:GITHUB_OUTPUT
            "reason=manual_replace_existing_draft" >> $env:GITHUB_OUTPUT
          }
          elseif ($isManual) {
            throw "Draft release $($env:TAG_NAME) already exists. Re-run with allow_asset_replace=true only to repair this unpublished draft."
          }
          else {
            throw "Draft release $($env:TAG_NAME) already exists and automatic replacement is disabled."
          }

      - name: Set up uv and Python
        if: steps.release_guard.outputs.should_release == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          checksum: "a047d55651bc3e0ca24595b25ec4cfcb10f9dca9fb56514e661269b37d4fae68"
          python-version: "3.11.15"
          activate-environment: true
          venv-path: ${{ runner.temp }}/netops-suite-release-venv
          no-project: true
          enable-cache: true
          cache-dependency-glob: requirements-dev-lock.txt

      - name: Validate Release Notes
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag_name }}
        run: python scripts/validate_release_notes.py --tag $env:RELEASE_TAG

      - name: Scan Repository For Secrets
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: |
          winget install `
            --id Gitleaks.Gitleaks `
            --exact `
            --version 8.30.1 `
            --silent `
            --accept-package-agreements `
            --accept-source-agreements `
            --disable-interactivity
          $gitleaks = Get-ChildItem `
            -LiteralPath "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" `
            -Recurse `
            -Filter "gitleaks.exe" `
            -ErrorAction Stop |
            Where-Object { $_.FullName -match "Gitleaks\.Gitleaks" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $gitleaks) {
            throw "gitleaks.exe was not found after installation."
          }
          & $gitleaks git --no-banner --redact --exit-code 1 .
          if ($LASTEXITCODE -ne 0) { throw "Git history secret scan failed." }
          & $gitleaks dir --no-banner --redact --exit-code 1 .
          if ($LASTEXITCODE -ne 0) { throw "Working tree secret scan failed." }

      - name: Install Build Dependencies
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: |
          uv pip install --require-hashes -r requirements-dev-lock.txt
          uv pip install "pyinstaller==6.21.0" "pyinstaller-hooks-contrib==2026.6"
          winget install `
            --id JRSoftware.InnoSetup `
            --exact `
            --version 6.7.3 `
            --silent `
            --scope user `
            --accept-package-agreements `
            --accept-source-agreements `
            --disable-interactivity

      - name: Verify Runtime Dependencies
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: |
          python -c "import sys; assert sys.version_info[:3] == (3, 11, 15), sys.version; import pyftpdlib, OpenSSL, paramiko, tftpy, netmiko, msoffcrypto, xlrd; from telnetlib3 import telnetlib; print('NetOps Suite runtime dependencies OK')"

      - name: Verify Installed Dependencies
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: uv pip check

      - name: Audit Installed Dependencies
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: python scripts/audit_dependencies.py

      - name: Lint Python Sources
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: python -m ruff check .

      - name: Compile Python Sources
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: python -m compileall -q main.py app netops_suite qa scripts tests

      - name: Run Test Suite
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: python -m pytest -q

      - name: Verify Tag Matches App Version
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        env:
          TAG_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $tagVersion = $env:TAG_VERSION
          $versionFile = Get-Content -Path "app/version.py" -Raw
          if ($versionFile -notmatch '__version__\s*=\s*"([^"]+)"') {
            throw "Could not find __version__ in app/version.py"
          }
          $appVersion = $Matches[1]

          if ($appVersion.Trim() -ne $tagVersion) {
            throw "Tag version ($tagVersion) does not match app/version.py version ($appVersion)."
          }

      - name: Build Installer
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
          WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
          ALLOW_UNSIGNED_RELEASE: ${{ inputs.allow_unsigned_release }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag_name }}
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          $hasCert = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_CERT_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_CERT_PASSWORD)
          $allowUnsigned = $env:ALLOW_UNSIGNED_RELEASE -eq "true"
          if ($hasCert -xor $hasPassword) {
            throw "Code-signing configuration is incomplete. Configure both certificate and password secrets."
          }
          if (-not $hasCert) {
            if (-not $allowUnsigned) {
              throw "Code signing is not configured. Set allow_unsigned_release=true only for an explicitly approved unsigned release."
            }
            Write-Warning "Building an explicitly approved unsigned release."
            .\scripts\build_release.ps1 `
              -Version $env:RELEASE_TAG `
              -Clean
          }
          else {
            $certPath = Join-Path $env:RUNNER_TEMP "netops-suite-codesign.pfx"
            try {
              [IO.File]::WriteAllBytes(
                $certPath,
                [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERT_BASE64)
              )
              .\scripts\build_release.ps1 `
                -Version $env:RELEASE_TAG `
                -Clean `
                -CodeSigningCertPath $certPath `
                -CodeSigningCertPassword $env:WINDOWS_CODESIGN_CERT_PASSWORD `
                -RequireCodeSigning
            }
            finally {
              Remove-Item -LiteralPath $certPath -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Verify Authenticode Signatures
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
          ALLOW_UNSIGNED_RELEASE: ${{ inputs.allow_unsigned_release }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $files = @(
            "dist/NetOpsSuite/NetOpsSuite.exe",
            "dist/release/NetOpsSuite-setup-$($env:RELEASE_VERSION).exe"
          )
          $allowUnsigned = $env:ALLOW_UNSIGNED_RELEASE -eq "true"
          $signingConfigured = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_CERT_BASE64)
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file
            if ($signingConfigured -and
                $signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
              throw "Authenticode signature verification failed for $file`: $($signature.StatusMessage)"
            }
            if (-not $signingConfigured -and -not $allowUnsigned) {
              throw "Unsigned artifact verification was not explicitly approved: $file"
            }
            if (-not $signingConfigured) {
              Write-Warning "Unsigned release artifact explicitly approved: $file"
            }
          }

      - name: Generate Dependency SBOM
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        run: |
          python scripts/audit_dependencies.py `
            --requirements requirements-lock.txt `
            --format cyclonedx-json `
            --output dist/release/python-dependencies.cdx.json

      - name: Upload Workflow Artifact
        if: steps.release_guard.outputs.should_release == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: NetOpsSuite-installer-${{ steps.meta.outputs.tag_name }}
          path: |
            dist/release/NetOpsSuite-setup-*.exe
            dist/release/SHA256SUMS.txt
            dist/release/python-dependencies.cdx.json
          if-no-files-found: error

      - name: Publish GitHub Release Asset
        if: steps.release_guard.outputs.should_release == 'true'
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          IS_PRERELEASE: ${{ steps.meta.outputs.is_prerelease }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          TARGET_COMMITISH: ${{ github.sha }}
          ALLOW_ASSET_REPLACE: ${{ inputs.allow_asset_replace }}
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          $asset = (Resolve-Path "dist/release/NetOpsSuite-setup-$($env:RELEASE_VERSION).exe").Path
          $checksum = Get-ChildItem -Path dist/release/SHA256SUMS.txt | Select-Object -First 1 -ExpandProperty FullName
          $dependencySbom = (Resolve-Path "dist/release/python-dependencies.cdx.json").Path
          $isPrerelease = [System.Convert]::ToBoolean($env:IS_PRERELEASE)
          $publishArgs = @{
            Repository = $env:REPOSITORY
            TagName = $env:RELEASE_TAG
            ReleaseName = $env:RELEASE_NAME
            TargetCommitish = $env:TARGET_COMMITISH
            AssetPath = $asset
            ChecksumPath = $checksum
            AdditionalAssetPath = @($dependencySbom)
          }
          if ($isPrerelease) {
            $publishArgs["IsPrerelease"] = $true
          }
          if ([System.Convert]::ToBoolean($env:ALLOW_ASSET_REPLACE)) {
            $publishArgs["AllowAssetReplace"] = $true
          }
          .\scripts\publish_release.ps1 @publishArgs
